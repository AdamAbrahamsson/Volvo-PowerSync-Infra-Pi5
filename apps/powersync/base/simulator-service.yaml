apiVersion: v1
kind: Service
metadata:
  name: simulator-service
  namespace: volvo-powersync
spec:
  selector:
    app: simulator-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator-service
  namespace: volvo-powersync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator-service
  template:
    metadata:
      labels:
        app: simulator-service
    spec:
      containers:
        - name: simulator-service
          image: ghcr.io/adamabrahamsson/volvo-powersync-simulator-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka.volvo-powersync.svc.cluster.local:9092
            - name: GRPC_CLIENT_BOOKING_SERVICE_ADDRESS
              value: static://booking-service.volvo-powersync.svc.cluster.local:9090
            - name: GRPC_CLIENT_BOOKING_SERVICE_NEGOTIATION_TYPE
              value: plaintext
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 700m
              memory: 768Mi
